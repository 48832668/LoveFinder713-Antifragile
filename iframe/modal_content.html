
<!-- 配置导入导出模态框 -->
<div class="modal fade" id="exportModal" tabindex="-1">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<div class="modal-header py-2">
				<h6 class="modal-title">📋 配置导入/导出</h6>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body">
				<div class="mb-3">
					<label class="form-label fw-bold">📤 导出配置</label>
					<p class="small text-muted mb-2">将当前配置导出为 JSON 文件，方便备份或分享</p>
					<button type="button" class="btn btn-primary btn-sm" id="exportBtn">
						⬇️ 导出配置文件
					</button>
				</div>
				<hr>
				<div class="mb-3">
					<label class="form-label fw-bold">📥 导入配置</label>
					<p class="small text-muted mb-2">从 JSON 文件导入配置（将覆盖当前配置）</p>
					<input type="file" class="form-control form-control-sm mb-2" id="importFile" accept=".json">
					<button type="button" class="btn btn-warning btn-sm" id="importBtn">
						⬆️ 导入配置文件
					</button>
				</div>
			</div>
		</div>
	</div>
</div>
