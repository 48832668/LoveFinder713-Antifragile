<!doctype html>
<html lang="zh-Hans">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Antifragile-总线助手</title>
		<link rel="stylesheet" href="/iframe/css/bootstrap.min.css" />
		<link rel="stylesheet" href="/iframe/css/style.css" />
	</head>
	<body>
		<div class="container-fluid p-2">
			<!-- 总线统计 -->
			<div class="card mb-2">
				<div class="card-header py-1 px-2" data-bs-toggle="collapse" data-bs-target="#statCollapse" style="cursor: pointer">
					<small class="fw-bold">📊 总线统计</small>
				</div>
				<div class="collapse show" id="statCollapse">
					<div class="card-body py-1 px-2">
						<div class="row g-1" id="statGrid">
							<div class="col-12 text-center text-muted">
								<div class="spinner-border spinner-border-sm me-1"></div>
								<small>加载中...</small>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 创建新总线 -->
			<div class="card mb-2">
				<div class="card-header py-1 px-2" data-bs-toggle="collapse" data-bs-target="#createCollapse" style="cursor: pointer">
					<small class="fw-bold">➕ 创建新总线</small>
				</div>
				<div class="collapse show" id="createCollapse">
					<div class="card-body py-2 px-2">
						<div class="alert alert-info py-1 px-2 mb-2 small" id="progressAlert" style="display: none">
							<div class="spinner-border spinner-border-sm me-1"></div>
							<span id="progressText">正在创建...</span>
						</div>

						<form id="createForm">
							<div class="row g-2 mb-2">
								<div class="col-5">
									<label class="form-label small mb-0">总线类型</label>
									<select class="form-select form-select-sm" id="busTypeSelect">
										<option value="">选择类型...</option>
									</select>
								</div>
								<div class="col-4">
									<label class="form-label small mb-0">序号</label>
									<input type="number" class="form-control form-control-sm" id="busIndexInput" value="1" min="1" max="99" />
								</div>
								<div class="col-3">
									<label class="form-label small mb-0">间距(mil)</label>
									<input
										type="number"
										class="form-control form-control-sm"
										id="spacingInput"
										value="10"
										min="5"
										max="200"
										step="5"
									/>
								</div>
							</div>

							<div class="mb-2" id="signalPreview" style="display: none">
								<label class="form-label small mb-1">网络标签预览</label>
								<div id="signalList" class="signal-list"></div>
							</div>

							<div class="mb-2" id="delayInfo" style="display: none">
								<div class="alert alert-warning py-1 px-2 small mb-0">
									⏱ <span id="delayCountdown">2</span> 秒后在鼠标位置创建...
								</div>
							</div>

							<div class="row g-1 mb-1">
								<div class="col-6">
									<button type="submit" class="btn btn-primary btn-sm w-100" id="createBtn">📍 固定放置</button>
								</div>
								<div class="col-6">
									<button type="button" class="btn btn-outline-primary btn-sm w-100" id="createDelayBtn">⏱ 延时放置</button>
								</div>
							</div>
							<div class="row g-1">
								<div class="col-6">
									<button type="button" class="btn btn-outline-info btn-sm w-100" id="shortcutBtn" title="点击注册快捷键">
										⌨ 注册快捷键
									</button>
								</div>
								<div class="col-6">
									<button type="button" class="btn btn-outline-secondary btn-sm w-100" id="refreshBtn" type="button">
										🔄 刷新 <span id="refreshShortcutHint"></span>
									</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>

			<!-- 信号总线 -->
			<div class="card mb-2">
				<div
					class="card-header py-1 px-2 d-flex justify-content-between align-items-center"
					data-bs-toggle="collapse"
					data-bs-target="#busListCollapse"
					style="cursor: pointer"
				>
					<small class="fw-bold">信号总线 <span id="busCountBadge" class="badge bg-secondary ms-1">0</span></small>
					<span class="collapse-icon">▼</span>
				</div>
				<div class="collapse show" id="busListCollapse">
					<div class="card-body py-2 px-2">
						<div class="mb-2 d-flex gap-2">
							<input type="text" class="form-control form-control-sm flex-grow-1" id="busSearchInput" placeholder="搜索总线..." />
							<button class="btn btn-outline-secondary btn-sm" id="sortBtn" type="button" title="排序">↕️</button>
						</div>
						<div id="busListContainer">
							<div class="text-center text-muted">
								<div class="spinner-border spinner-border-sm me-1"></div>
								<small>加载中...</small>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 电源总线 -->
			<div class="card mb-2">
				<div
					class="card-header py-1 px-2 d-flex justify-content-between align-items-center"
					data-bs-toggle="collapse"
					data-bs-target="#powerListCollapse"
					style="cursor: pointer"
				>
					<small class="fw-bold">电源总线 <span id="powerCountBadge" class="badge bg-secondary ms-1">0</span></small>
					<span class="collapse-icon">▼</span>
				</div>
				<div class="collapse show" id="powerListCollapse">
					<div class="card-body py-2 px-2">
						<div class="mb-2 d-flex gap-2">
							<input type="text" class="form-control form-control-sm flex-grow-1" id="powerSearchInput" placeholder="搜索电源..." />
							<button class="btn btn-outline-secondary btn-sm" id="powerSortBtn" type="button" title="按名称排序">↕️</button>
							<button class="btn btn-outline-success btn-sm" id="powerCreateBtn" type="button" title="新建电源轨道">+</button>
						</div>
						<div id="powerListContainer">
							<div class="text-center text-muted">
								<small>暂无电源网络</small>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 已有元件 -->
			<div class="card mb-2">
				<div
					class="card-header py-1 px-2 d-flex justify-content-between align-items-center"
					data-bs-toggle="collapse"
					data-bs-target="#compListCollapse"
					style="cursor: pointer"
				>
					<small class="fw-bold">已有元件 <span id="compCountBadge" class="badge bg-secondary ms-1">0 图页 · 0 元件</span></small>
					<span class="collapse-icon">▼</span>
				</div>
				<div class="collapse show" id="compListCollapse">
					<div class="card-body py-2 px-2">
						<div class="mb-2 d-flex gap-2">
							<input type="text" class="form-control form-control-sm flex-grow-1" id="compSearchInput" placeholder="搜索元件..." />
							<button class="btn btn-outline-secondary btn-sm" id="compSortBtn" type="button" title="按总线数量排序">↕️</button>
						</div>
						<div id="compListContainer">
							<div class="text-center text-muted">
								<div class="spinner-border spinner-border-sm me-1"></div>
								<small>加载中...</small>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 调试日志 -->
			<div class="card mb-2">
				<div
					class="card-header py-1 px-2 d-flex justify-content-between align-items-center"
					data-bs-toggle="collapse"
					data-bs-target="#debugLogCollapse"
					style="cursor: pointer"
				>
					<small class="fw-bold">🐛 调试日志</small>
					<span class="collapse-icon">▼</span>
				</div>
				<div class="collapse" id="debugLogCollapse">
					<div class="card-body py-2 px-2">
						<div class="d-flex justify-content-between align-items-center mb-2">
							<small class="text-muted" id="logCount">0 条记录</small>
							<button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2" id="clearLogBtn">🗑️ 清空</button>
						</div>
						<div id="debugLogContainer" class="debug-log-container">
							<small class="text-muted">暂无日志</small>
						</div>
					</div>
				</div>
			</div>

			<!-- 总线详情模态框 -->
			<div class="modal fade" id="busDetailModal" tabindex="-1">
				<div class="modal-dialog modal-dialog-centered modal-lg">
					<div class="modal-content">
						<div class="modal-header py-2">
							<h6 class="modal-title" id="modalTitle">总线详情</h6>
							<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
						</div>
						<div class="modal-body" id="modalBody"></div>
					</div>
				</div>
			</div>

			<!-- 新建电源轨道模态框 -->
			<div class="modal fade" id="powerCreateModal" tabindex="-1">
				<div class="modal-dialog modal-dialog-centered">
					<div class="modal-content">
						<div class="modal-header py-2">
							<h6 class="modal-title">新建电源轨道</h6>
							<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
						</div>
						<div class="modal-body py-2">
							<div class="mb-2">
								<label class="form-label small mb-1">电源名称</label>
								<input type="text" class="form-control form-control-sm" id="powerNameInput" placeholder="如: SYS、MCU、VCC" />
							</div>
							<div class="mb-2">
								<label class="form-label small mb-1">电压值</label>
								<input type="text" class="form-control form-control-sm" id="powerVoltageInput" placeholder="如: 3V3、5V、12V" />
							</div>
							<div class="mb-2">
								<label class="form-label small mb-1">网络标签预览</label>
								<div id="powerPreview" class="p-2 bg-light border rounded">
									<code class="text-muted">PW_名称_电压</code>
								</div>
							</div>
						</div>
						<div class="modal-footer py-2">
							<button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
							<button type="button" class="btn btn-primary btn-sm" id="powerSaveBtn">保存</button>
						</div>
					</div>
				</div>
			</div>

			<!-- 元件详情模态框 -->
			<div class="modal fade" id="compDetailModal" tabindex="-1">
				<div class="modal-dialog modal-dialog-centered modal-lg">
					<div class="modal-content">
						<div class="modal-header py-2">
							<h6 class="modal-title" id="compModalTitle">元件详情</h6>
							<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
						</div>
						<div class="modal-body" id="compModalBody"></div>
					</div>
				</div>
			</div>
		</div>

		<script src="/iframe/js/bootstrap.bundle.min.js"></script>
		<script>
			const edaApi = window.eda || window.parent?.eda || window.top?.eda;

			// 配置存储键名
			const STORAGE_KEY = 'mcu-bus-helper-settings';

			// 前缀黑名单 - 禁止使用的前缀（保留用于特殊用途如电源网络）
			const PREFIX_BLACKLIST = ['PW'];

			/**
			 * 检查前缀是否在黑名单中
			 */
			function isPrefixBlacklisted(prefix) {
				const normalized = (prefix || '').toUpperCase().trim();
				return PREFIX_BLACKLIST.includes(normalized);
			}

			/**
			 * 获取黑名单提示消息
			 */
			function getBlacklistMessage() {
				return `禁止使用的前缀：${PREFIX_BLACKLIST.join('、')}（保留用于特殊用途）`;
			}

			// 默认总线配置
			const DEFAULT_BUS_CONFIGS = [
				{ name: 'I2C', presetName: 'I2C', labelId: 'I2C', prefix: '', signals: ['SDA', 'SCL'], color: '#0d6efd' },
				{ name: 'SPI', presetName: 'SPI', labelId: 'SPI', prefix: '', signals: ['MOSI', 'MISO', 'SCK', 'CS'], color: '#198754' },
				{ name: 'UART', presetName: 'UART', labelId: 'UART', prefix: '', signals: ['TX', 'RX'], color: '#ffc107' },
				{ name: 'CAN', presetName: 'CAN', labelId: 'CAN', prefix: '', signals: ['CANH', 'CANL'], color: '#dc3545' },
				{ name: 'SDIO', presetName: 'SDIO', labelId: 'SDIO', prefix: '', signals: ['CLK', 'CMD', 'D0', 'D1', 'D2', 'D3'], color: '#6f42c1' },
			];

			// 默认配置
			const DEFAULT_SETTINGS = {
				fixedX: 20,
				fixedY: 20,
				delaySeconds: 3,
				wireSpacing: 10,
				wireLength: 50,
				wireDirection: 'right',
				shortcutKey: '1',
				refreshShortcutKey: 'R',
				netPrefix: 'SYS',
				historyPrefixes: [],
				enabledHistoryPrefixes: [],
				busConfigs: DEFAULT_BUS_CONFIGS,
				defaultBusType: 'I2C',
				defaultBusIndex: 1,
				customPowerNets: [], // 用户自定义的电源轨道
			};

			/**
			 * 检查是否存在已保存的配置
			 */
			function hasExistingConfig() {
				try {
					const saved = localStorage.getItem(STORAGE_KEY);
					if (saved) {
						const config = JSON.parse(saved);
						// 检查关键字段是否存在
						return config && typeof config.netPrefix === 'string';
					}
				} catch (e) {
					console.error('[配置] 检查失败:', e);
				}
				return false;
			}

			/**
			 * 初始化配置（首次使用时调用）
			 */
			function initializeConfig() {
				const defaultConfig = { ...DEFAULT_SETTINGS };
				saveSettings(defaultConfig);
				console.log('[配置] 已初始化默认配置');
				return defaultConfig;
			}

			// 加载配置
			function loadSettings() {
				try {
					const saved = localStorage.getItem(STORAGE_KEY);
					if (saved) {
						const parsed = JSON.parse(saved);
						// 合并默认配置，确保新字段有默认值
						return { ...DEFAULT_SETTINGS, ...parsed };
					}
				} catch (e) {
					console.error('[配置] 加载失败:', e);
				}
				return { ...DEFAULT_SETTINGS };
			}

			// 保存配置
			function saveSettings(settings) {
				try {
					localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
				} catch (e) {
					console.error('[配置] 保存失败:', e);
				}
			}

			// 从配置加载总线配置
			function getBusConfigs() {
				const settings = loadSettings();
				if (settings.busConfigs && settings.busConfigs.length > 0) {
					// 兼容旧格式，转换为新格式
					return settings.busConfigs.map((cfg) => ({
						name: cfg.name || cfg.type || 'UNKNOWN',
						presetName: cfg.presetName || cfg.name || cfg.type || 'UNKNOWN',
						labelId: cfg.labelId || cfg.name || cfg.type || 'UNKNOWN',
						prefix: cfg.prefix || '',
						signals: cfg.signals || [],
						color: cfg.color || '#6c757d',
					}));
				}
				return DEFAULT_BUS_CONFIGS;
			}

			// 获取网络标签前缀（全局默认前缀）
			function getNetPrefix() {
				const settings = loadSettings();
				return settings.netPrefix || 'SYS';
			}

			// 获取历史前缀列表
			function getHistoryPrefixes() {
				const settings = loadSettings();
				return settings.historyPrefixes || [];
			}

			// 保存历史前缀
			function saveHistoryPrefix(prefix) {
				if (!prefix) return;
				const settings = loadSettings();
				if (!settings.historyPrefixes) settings.historyPrefixes = [];
				if (!settings.historyPrefixes.includes(prefix)) {
					settings.historyPrefixes.push(prefix);
					saveSettings(settings);
				}
			}

			// 获取启用的前缀列表（包括当前前缀和勾选的历史前缀）
			function getEnabledPrefixes() {
				const settings = loadSettings();
				const prefixes = [settings.netPrefix || 'SYS'];
				if (settings.enabledHistoryPrefixes) {
					settings.enabledHistoryPrefixes.forEach((p) => {
						if (!prefixes.includes(p)) prefixes.push(p);
					});
				}
				return prefixes;
			}

			let BUS_CONFIGS = getBusConfigs();

			let stats = {};
			let buses = [];
			let busComponents = {};
			let allComponents = []; // 所有元件
			let pageNameMap = {}; // 图页UUID -> 图页名称映射
			let sortDescending = true; // 总线排序方向
			let compSortDescending = true; // 元件排序方向
			let creating = false;
			let busSearchText = ''; // 总线搜索文本
			let compSearchText = ''; // 元件搜索文本

			const $ = (id) => document.getElementById(id);
			const busTypeSelect = $('busTypeSelect');
			const busIndexInput = $('busIndexInput');
			const spacingInput = $('spacingInput');
			const signalPreview = $('signalPreview');
			const signalList = $('signalList');
			const createBtn = $('createBtn');
			const createDelayBtn = $('createDelayBtn');
			const shortcutBtn = $('shortcutBtn');
			const delayInfo = $('delayInfo');
			const delayCountdown = $('delayCountdown');
			const statGrid = $('statGrid');
			const busListContainer = $('busListContainer');
			const compListContainer = $('compListContainer');
			const refreshBtn = $('refreshBtn');
			const sortBtn = $('sortBtn');
			const progressAlert = $('progressAlert');
			const progressText = $('progressText');
			const busDetailModal = new bootstrap.Modal($('busDetailModal'));
			const compDetailModal = new bootstrap.Modal($('compDetailModal'));
			const powerCreateModal = new bootstrap.Modal($('powerCreateModal'));

			// 修复模态框焦点警告
			$('busDetailModal').addEventListener('hide.bs.modal', () => document.activeElement.blur());
			$('compDetailModal').addEventListener('hide.bs.modal', () => document.activeElement.blur());
			$('powerCreateModal').addEventListener('hide.bs.modal', () => document.activeElement.blur());

			function showToast(msg, type = 'info') {
				if (edaApi?.sys_Message) {
					const t =
						{ success: ESYS_ToastMessageType.SUCCESS, error: ESYS_ToastMessageType.ERROR, warning: ESYS_ToastMessageType.WARNING }[
							type
						] || ESYS_ToastMessageType.INFO;
					try {
						edaApi.sys_Message.showToastMessage(msg, t, 3);
					} catch (e) {}
				}
			}

			// ==================== 调试日志系统（共享） ====================
			const LOG_STORAGE_KEY = 'mcu-bus-helper-logs';
			const debugLogContainer = $('debugLogContainer');
			const logCountEl = $('logCount');
			const clearLogBtn = $('clearLogBtn');

			/**
			 * 加载共享日志
			 */
			function loadSharedLogs() {
				try {
					const saved = localStorage.getItem(LOG_STORAGE_KEY);
					if (saved) {
						return JSON.parse(saved);
					}
				} catch (e) {
					console.error('[日志] 加载失败:', e);
				}
				return [];
			}

			/**
			 * 保存共享日志
			 */
			function saveSharedLogs(logs) {
				try {
					localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(logs));
				} catch (e) {
					console.error('[日志] 保存失败:', e);
				}
			}

			/**
			 * 添加调试日志
			 * @param {string} msg - 日志消息
			 * @param {string} type - 日志类型: info, success, warning, error
			 */
			function addDebugLog(msg, type = 'info') {
				const now = new Date();
				const time = now.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');

				// 加载现有日志
				const logs = loadSharedLogs();
				logs.push({ time, msg, type, source: '主面板' });

				// 限制日志数量
				while (logs.length > 100) {
					logs.shift();
				}

				// 保存日志
				saveSharedLogs(logs);

				// 渲染日志
				renderDebugLogs();

				console.log(`[总线助手-主面板] ${time} [${type.toUpperCase()}] ${msg}`);
			}

			/**
			 * 渲染调试日志
			 */
			function renderDebugLogs() {
				const logs = loadSharedLogs();

				if (logs.length === 0) {
					debugLogContainer.innerHTML = '<small class="text-muted">暂无日志</small>';
					logCountEl.textContent = '0 条记录';
					return;
				}

				debugLogContainer.innerHTML = logs
					.map(
						(item) => `
					<div class="debug-log-item">
						<span class="debug-log-time">${item.time}</span>
						<span class="debug-log-${item.type}">[${item.source || '主面板'}] ${escapeHtml(item.msg)}</span>
					</div>
				`,
					)
					.join('');

				logCountEl.textContent = `${logs.length} 条记录`;

				// 滚动到底部
				debugLogContainer.scrollTop = debugLogContainer.scrollHeight;
			}

			/**
			 * HTML 转义
			 */
			function escapeHtml(text) {
				const div = document.createElement('div');
				div.textContent = text;
				return div.innerHTML;
			}

			/**
			 * 清空调试日志
			 */
			function clearDebugLogs() {
				saveSharedLogs([]);
				renderDebugLogs();
			}

			// 清空日志按钮事件
			clearLogBtn.onclick = clearDebugLogs;

			// 生成网络标签名称
			// 格式:
			// - 无自定义前缀: {全局前缀}_{总线名称}{序号}_{信号}
			// - 有自定义前缀: {自定义前缀}_{总线名称}{序号}_{信号}
			function generateBusNetName(busName, idx, sig) {
				const cfg = BUS_CONFIGS.find((c) => c.presetName === busName);
				const globalPrefix = getNetPrefix();
				// 如果总线有自定义前缀则完全替代全局前缀
				const prefix = cfg?.prefix || globalPrefix;
				// 使用 labelId 生成网络标签
				const labelId = cfg?.labelId || cfg?.name || busName;
				return `${prefix}_${labelId}${idx}_${sig}`;
			}

			// 解析网络标签名称
			// 格式: {前缀}_{总线名称}{序号}_{信号}
			function parseNetName(net) {
				// 收集所有可能的前缀：全局前缀 + 历史前缀 + 所有总线的自定义前缀
				const allPrefixes = new Set();
				allPrefixes.add(getNetPrefix());
				getEnabledPrefixes().forEach((p) => allPrefixes.add(p));
				BUS_CONFIGS.forEach((c) => {
					if (c.prefix) allPrefixes.add(c.prefix);
				});

				for (const prefix of allPrefixes) {
					const regex = new RegExp(`^${prefix}_([A-Z0-9]+)(\\d+)_([A-Z0-9]+)$`);
					const m = net.match(regex);
					if (m) {
						const busName = m[1];
						// 通过 labelId 匹配总线名称
						const cfg = BUS_CONFIGS.find((c) => c.labelId === busName);
						if (cfg && cfg.signals.includes(m[3])) {
							return { type: cfg.presetName, idx: +m[2], signal: m[3] };
						}
					}
				}
				return null;
			}

			// 供电网络数据
			let powerNets = [];

			/**
			 * 解析供电网络名称
			 * 格式: PW_{名称}_{电压值}
			 * 例如: PW_SYS_3V3、PW_MCU_5V、PW_12V
			 * 电压值格式: 数字 + V + 可选小数部分，如 3V3=3.3V, 5V=5V, 12V=12V
			 */
			function parsePowerNetName(net) {
				// 匹配格式: PW_{名称}_{电压值}
				// 名称: 字母数字组合，如 SYS, MCU, VCC
				// 电压值: 数字 + V + 可选数字，如 3V3, 5V, 12V, 1V8
				const regex = /^PW_([A-Za-z0-9]+)_([0-9]+V[0-9]*)$/i;
				const m = net.match(regex);
				if (m) {
					const powerName = m[1].toUpperCase(); // 电源名称（如 SYS）
					const voltageStr = m[2].toUpperCase(); // 电压值字符串
					// 解析电压值
					let voltage = voltageStr;
					// 将 3V3 转换为 3.3V 显示
					const voltageMatch = voltageStr.match(/^(\d+)V(\d*)$/);
					if (voltageMatch) {
						const major = voltageMatch[1];
						const minor = voltageMatch[2];
						if (minor) {
							voltage = `${major}.${minor}V`;
						} else {
							voltage = `${major}V`;
						}
					}
					return { name: net, voltage, voltageStr, powerName };
				}
				return null;
			}

			// 根据朝向计算导线坐标
			function getWireCoords(x, y, index, spacing, length, direction) {
				switch (direction) {
					case 'left':
						return [x, y + index * spacing, x - length, y + index * spacing];
					case 'up':
						return [x + index * spacing, y, x + index * spacing, y - length];
					case 'down':
						return [x + index * spacing, y, x + index * spacing, y + length];
					case 'right':
					default:
						return [x, y + index * spacing, x + length, y + index * spacing];
				}
			}

			// 根据导线方向计算网络标签旋转角度（标签朝向导线起点）
			function getNetPortRotation(direction) {
				switch (direction) {
					case 'right':
						return 180; // 导线向右，标签朝左
					case 'left':
						return 0; // 导线向左，标签朝右
					case 'down':
						return 270; // 导线向下，标签朝上
					case 'up':
						return 90; // 导线向上，标签朝下
					default:
						return 180;
				}
			}

			// 在鼠标位置创建总线（快捷键调用）
			async function createBusAtMousePosition() {
				console.log('[总线助手] 开始创建总线...');

				const type = busTypeSelect.value;
				const idx = +busIndexInput.value || 1;

				if (!type) {
					showToast('请先选择总线类型', 'warning');
					return;
				}

				const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
				const settings = loadSettings();
				const spacing = +spacingInput.value || settings.wireSpacing || 10;
				const length = settings.wireLength || 50;
				const direction = settings.wireDirection || 'right';
				const netPortRotation = getNetPortRotation(direction);

				try {
					const pos = await edaApi.sch_SelectControl.getCurrentMousePosition();
					console.log('[总线助手] 鼠标位置:', pos);

					if (!pos) {
						showToast('无法获取鼠标位置', 'error');
						return;
					}

					const ids = [];
					let ok = 0;

					for (let i = 0; i < cfg.signals.length; i++) {
						const name = generateBusNetName(type, idx, cfg.signals[i]);
						try {
							const coords = getWireCoords(pos.x, pos.y, i, spacing, length, direction);
							const w = await edaApi.sch_PrimitiveWire.create(coords, name);
							if (w) {
								ok++;
								const pid = w.primitiveId || w.getState_PrimitiveId?.();
								if (pid) ids.push(pid);
							}
						} catch (e) {
							console.error('创建导线失败:', e);
						}
						await new Promise((r) => setTimeout(r, 30));
					}

					if (ids.length) {
						try {
							await edaApi.sch_SelectControl.clearSelected();
							await edaApi.sch_SelectControl.doSelectPrimitives(ids);
						} catch (e) {}
					}

					showToast(`创建 ${cfg.name}#${idx}，成功 ${ok}/${cfg.signals.length} 个`, ok === cfg.signals.length ? 'success' : 'warning');
					// 快捷键创建只在当前图页，使用快速刷新
					await loadCurrentSchematicPage('快捷键创建');
				} catch (e) {
					console.error('创建总线失败:', e);
					showToast(`创建失败: ${e}`, 'error');
				}
			}

			// 应用配置到界面

			async function getComponentBusMapping(wires, accumulate = false, currentPageUuid = null) {
				if (!accumulate) {
					busComponents = {};
					allComponents = [];
				}

				try {
					const wireCoordMap = new Map();

					if (wires && wires.length) {
						for (const wire of wires) {
							try {
								const net = wire.net || wire.getState_Net?.() || '';
								if (!net) continue;

								const line = wire.line || wire.getState_Line?.();
								const primitiveId = wire.primitiveId || wire.getState_PrimitiveId?.();

								if (!line) continue;

								if (Array.isArray(line)) {
									if (typeof line[0] === 'number') {
										for (let i = 0; i < line.length; i += 2) {
											const key = `${line[i]},${line[i + 1]}`;
											wireCoordMap.set(key, { wire, primitiveId, net, line });
										}
									} else {
										for (const pt of line) {
											const key = `${pt[0]},${pt[1]}`;
											wireCoordMap.set(key, { wire, primitiveId, net, line });
										}
									}
								}
							} catch (e) {}
						}
					}

					const components = await edaApi.sch_PrimitiveComponent.getAll();
					if (!components || !components.length) return;

					// 如果没有传入图页UUID，尝试从当前图页获取
					let pageUuid = currentPageUuid;
					if (!pageUuid) {
						try {
							const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
							pageUuid = currentPage?.uuid;
						} catch (e) {}
					}

					for (const comp of components) {
						try {
							const designator = comp.getState_Designator?.() || comp.designator;
							if (!designator) continue;

							const compName = comp.manufacturerId || comp.getState_Name?.() || comp.name || '';
							const pins = await edaApi.sch_PrimitiveComponent.getAllPinsByPrimitiveId(comp.primitiveId);
							if (!pins || !pins.length) continue;

							// 保存所有元件信息，使用传入或获取的图页UUID
							const compInfo = {
								designator,
								name: compName,
								primitiveId: comp.primitiveId,
								schematicPageUuid: pageUuid || comp.schematicPageUuid, // 优先使用传入的图页UUID
								pins: [],
							};

							for (const pin of pins) {
								const pinX = pin.getState_X?.() || pin.x;
								const pinY = pin.getState_Y?.() || pin.y;
								const pinName = pin.getState_PinName?.() || pin.pinName || '';
								const pinNumber = pin.getState_PinNumber?.() || pin.pinNumber || '';
								const pinRotation = pin.getState_Rotation?.() ?? pin.rotation ?? 0;

								if (pinX === undefined || pinY === undefined) continue;

								const key = `${pinX},${pinY}`;
								const wireInfo = wireCoordMap.get(key);

								const pinData = {
									number: pinNumber,
									name: pinName,
									x: pinX,
									y: pinY,
									rotation: pinRotation,
									net: wireInfo?.net || null,
									wirePrimitiveId: wireInfo?.primitiveId,
									wireLine: wireInfo?.line,
								};

								compInfo.pins.push(pinData);

								if (wireInfo) {
									const parsed = parseNetName(wireInfo.net);
									if (parsed) {
										const busKey = `${parsed.type}_${parsed.idx}`;
										if (!busComponents[busKey]) {
											busComponents[busKey] = {};
										}
										if (!busComponents[busKey][designator]) {
											busComponents[busKey][designator] = {
												name: compName,
												schematicPageUuid: pageUuid || comp.schematicPageUuid, // 使用传入的图页UUID
												pins: [],
											};
										}
										busComponents[busKey][designator].pins.push({
											...pinData,
											wireLine: wireInfo.line,
										});
									}
								}
							}

							// 只保存引脚数>=4的元件
							if (compInfo.pins.length >= 4) {
								allComponents.push(compInfo);
							}
						} catch (e) {}
					}
				} catch (e) {
					console.error('获取元件总线映射失败:', e);
				}
			}

			/**
			 * 加载当前图页数据（用于固定位置/延时放置后的快速刷新）
			 * @param {string} reason - 刷新原因，用于日志记录
			 */
			async function loadCurrentSchematicPage(reason = '快速刷新') {
				addDebugLog(`刷新当前图页 [原因: ${reason}]`, 'info');

				try {
					const currentDoc = await edaApi.dmt_SelectControl.getCurrentDocumentInfo();
					if (!currentDoc || currentDoc.documentType !== 1) {
						addDebugLog('当前文档不是原理图图页', 'warning');
						return;
					}

					// 获取当前图页信息
					const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
					const currentPageUuid = currentPage?.uuid;
					const currentPageName = currentPage?.name || '未知';

					// 保存当前图页名称映射
					if (currentPageUuid) {
						pageNameMap = { [currentPageUuid]: currentPageName };
					}

					// 只获取当前图页的数据
					const wires = (await edaApi.sch_PrimitiveWire.getAll()) || [];

					// 解析当前图页的总线实例和供电网络
					const pageBusMap = new Map();
					const pageSeen = new Set();
					powerNets = [];
					const powerSeen = new Set();

					wires.forEach((w) => {
						try {
							const net = w.net || '';
							if (!net || pageSeen.has(net)) return;
							pageSeen.add(net);

							// 先尝试解析为总线网络
							const parsed = parseNetName(net);
							if (parsed) {
								const key = `${parsed.type}_${parsed.idx}`;
								if (!pageBusMap.has(key)) {
									pageBusMap.set(key, { type: parsed.type, idx: parsed.idx, count: 0 });
								}
								pageBusMap.get(key).count++;
								return;
							}

							// 再尝试解析为供电网络
							if (!powerSeen.has(net)) {
								const powerParsed = parsePowerNetName(net);
								if (powerParsed) {
									powerSeen.add(net);
									powerNets.push(powerParsed);
								}
							}
						} catch (e) {}
					});

					// 生成总线实例日志
					if (pageBusMap.size > 0) {
						const busList = Array.from(pageBusMap.values())
							.map((b) => `${b.type}${b.idx}`)
							.join('、');
						addDebugLog(`当前图页: ${busList}`, 'success');
					} else {
						addDebugLog('当前图页: 无总线', 'info');
					}

					// 生成供电网络日志
					if (powerNets.length > 0) {
						const powerList = powerNets.map((p) => p.voltage).join('、');
						addDebugLog(`供电网络: ${powerList}`, 'success');
					}

					// 重置并获取当前图页的元件映射
					busComponents = {};
					allComponents = [];
					await getComponentBusMapping(wires, false, currentPageUuid);

					// 解析总线
					stats = {};
					buses = [];
					const map = new Map();
					const seen = new Set();

					wires.forEach((w) => {
						try {
							const net = w.net || '';
							if (!net || seen.has(net)) return;
							const parsed = parseNetName(net);
							if (!parsed) return;
							seen.add(net);
							const key = `${parsed.type}_${parsed.idx}`;
							if (!map.has(key)) map.set(key, { type: parsed.type, idx: parsed.idx, nets: [] });
							map.get(key).nets.push(net);
						} catch (e) {}
					});

					map.forEach((b, key) => {
						b.components = busComponents[key] ? Object.keys(busComponents[key]) : [];
						buses.push(b);
						stats[b.type] = (stats[b.type] || 0) + 1;
					});

					sortBuses();
					renderBusStatistics();
					renderBuses();
					renderPowerNets();
					renderComponents();

					addDebugLog('刷新完成', 'success');
				} catch (e) {
					addDebugLog(`刷新失败: ${e.message || e}`, 'error');
					console.error('刷新当前图页失败:', e);
				}
			}

			/**
			 * 加载所有图页数据（用于手动刷新或首次加载）
			 * @param {string} reason - 刷新原因，用于日志记录
			 */
			async function loadAllSchematicPages(reason = '手动刷新') {
				// 清空之前的日志
				clearDebugLogs();
				addDebugLog(`开始刷新 [原因: ${reason}]`, 'info');

				try {
					// 检查当前文档是否为原理图图页
					const currentDoc = await edaApi.dmt_SelectControl.getCurrentDocumentInfo();
					addDebugLog(`当前文档类型: ${currentDoc?.documentType}`, 'info');

					let wires = [];

					// 只获取当前活动的原理图图页的导线
					// documentType === 1 表示原理图图页
					if (currentDoc && currentDoc.documentType === 1) {
						// 获取当前原理图的所有图页信息
						let allPages = [];
						try {
							allPages = (await edaApi.dmt_Schematic.getCurrentSchematicAllSchematicPagesInfo()) || [];
							addDebugLog(`发现 ${allPages.length} 个图页`, 'success');
						} catch (e) {
							addDebugLog(`获取图页信息失败: ${e.message}`, 'error');
							console.warn('获取所有图页信息失败:', e);
							allPages = [];
						}

						// 保存当前图页的 UUID
						const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
						const currentPageUuid = currentPage?.uuid;
						addDebugLog(`当前图页: ${currentPage?.name || '未知'} (${currentPageUuid})`, 'info');

						// 初始化元件数据
						busComponents = {};
						allComponents = [];
						pageNameMap = {}; // 重置图页名称映射
						powerNets = [];
						const powerSeen = new Set();
						let totalComponents = 0;

						// 遍历所有图页获取导线和元件
						for (const page of allPages) {
							try {
								addDebugLog(`正在处理图页: ${page.name}...`, 'info');

								// 保存图页名称映射
								pageNameMap[page.uuid] = page.name;

								// 始终显式激活图页，确保 API 能正确获取该图页的数据
								// 即使是当前图页也需要激活，因为切换图页后 API 状态可能不同步
								await edaApi.dmt_EditorControl.openDocument(page.uuid);
								// 等待图页切换完成
								await new Promise((r) => setTimeout(r, 100));
								// 获取该图页的导线
								const pageWires = (await edaApi.sch_PrimitiveWire.getAll()) || [];

								// 解析该图页的总线实例和供电网络
								const pageBusMap = new Map();
								const pageSeen = new Set();
								pageWires.forEach((w) => {
									try {
										const net = w.net || '';
										if (!net || pageSeen.has(net)) return;
										pageSeen.add(net);

										// 先尝试解析为总线网络
										const parsed = parseNetName(net);
										if (parsed) {
											const key = `${parsed.type}_${parsed.idx}`;
											if (!pageBusMap.has(key)) {
												pageBusMap.set(key, { type: parsed.type, idx: parsed.idx, count: 0 });
											}
											pageBusMap.get(key).count++;
											return;
										}

										// 再尝试解析为供电网络
										if (!powerSeen.has(net)) {
											const powerParsed = parsePowerNetName(net);
											if (powerParsed) {
												powerSeen.add(net);
												powerNets.push(powerParsed);
											}
										}
									} catch (e) {}
								});

								// 生成总线实例日志
								if (pageBusMap.size > 0) {
									const busList = Array.from(pageBusMap.values())
										.map((b) => `${b.type}${b.idx}`)
										.join('、');
									addDebugLog(`图页 ${page.name}: ${busList}`, 'success');
								} else {
									addDebugLog(`图页 ${page.name}: 无总线`, 'info');
								}

								wires.push(...pageWires);

								// 获取该图页的元件（累积模式），传入当前图页UUID
								const prevCompCount = allComponents.length;
								await getComponentBusMapping(pageWires, true, page.uuid);
								const newCompCount = allComponents.length - prevCompCount;
								totalComponents += newCompCount;
							} catch (e) {
								addDebugLog(`图页 ${page.name} 失败: ${e.message}`, 'error');
								console.warn(`获取图页 ${page.name} 的数据失败:`, e);
							}
						}

						// 恢复到原来的图页
						if (currentPageUuid) {
							try {
								await edaApi.dmt_EditorControl.openDocument(currentPageUuid);
								addDebugLog('已恢复原图页', 'success');
							} catch (e) {
								addDebugLog(`恢复原图页失败: ${e.message}`, 'error');
								console.warn('恢复原图页失败:', e);
							}
						}

						addDebugLog(`总计: ${wires.length} 条导线, ${totalComponents} 个元件`, 'success');
					} else {
						addDebugLog('当前文档不是原理图图页', 'warning');
					}

					stats = {};
					buses = [];
					const map = new Map();
					const seen = new Set();

					(wires || []).forEach((w) => {
						try {
							const net = w.net || '';
							if (!net || seen.has(net)) return;
							const parsed = parseNetName(net);
							if (!parsed) return;
							seen.add(net);
							const key = `${parsed.type}_${parsed.idx}`;
							if (!map.has(key)) map.set(key, { type: parsed.type, idx: parsed.idx, nets: [] });
							map.get(key).nets.push(net);
						} catch (e) {}
					});

					// 元件已在遍历图页时获取

					map.forEach((b, key) => {
						b.components = busComponents[key] ? Object.keys(busComponents[key]) : [];
						buses.push(b);
						stats[b.type] = (stats[b.type] || 0) + 1;
					});

					addDebugLog(`解析完成: ${buses.length} 个总线实例`, 'success');

					// 输出总线统计
					const statsText = Object.entries(stats)
						.map(([type, count]) => `${type}: ${count}`)
						.join(', ');
					if (statsText) {
						addDebugLog(`总线统计: ${statsText}`, 'info');
					}

					// 输出供电网络统计
					if (powerNets.length > 0) {
						const powerList = powerNets.map((p) => p.voltage).join('、');
						addDebugLog(`供电网络: ${powerList}`, 'success');
					}

					sortBuses();
					renderBusStatistics();
					renderBuses();
					renderPowerNets();
					renderComponents();

					addDebugLog('刷新完成', 'success');
				} catch (e) {
					addDebugLog(`加载失败: ${e.message || e}`, 'error');
					console.error('加载失败:', e);
				}
			}

			function sortBuses() {
				buses.sort((a, b) => {
					const countA = a.components?.length || 0;
					const countB = b.components?.length || 0;
					if (countA !== countB) {
						return sortDescending ? countB - countA : countA - countB;
					}
					return a.type.localeCompare(b.type) || a.idx - b.idx;
				});
			}

			function renderBusStatistics() {
				statGrid.innerHTML = BUS_CONFIGS.map(
					(c) => `
					<div class="col-4"><div class="stat-card" data-type="${c.presetName}" style="border-left: 3px solid ${c.color}">
							<div class="fw-bold" style="color:${c.color}">${stats[c.presetName] || 0}</div>
							<small class="text-muted">${c.presetName}</small>
						</div>
					</div>
				`,
				).join('');
				statGrid.querySelectorAll('.stat-card').forEach((card) => {
					card.onclick = () => {
						busTypeSelect.value = card.dataset.type;
						busTypeSelect.dispatchEvent(new Event('change'));
					};
				});

				// 更新卡片标题中的统计信息
				const totalBuses = buses.length;
				$('busCountBadge').textContent = `${totalBuses} 总线`;

				// 计算图页数量和元件数量
				const pageUuids = new Set(allComponents.map((c) => c.schematicPageUuid).filter(Boolean));
				const totalComponents = allComponents.length;
				$('compCountBadge').textContent = `${pageUuids.size} 图页 · ${totalComponents} 元件`;

				// 更新电源总线统计
				$('powerCountBadge').textContent = `${powerNets.length} 电源`;
			}

			function renderPowerNets() {
				const container = $('powerListContainer');

				// 合并扫描到的电源和用户自定义的电源
				const allPowerNets = [...powerNets];

				// 添加用户自定义的电源（如果不在扫描结果中）
				customPowerNets.forEach((cp) => {
					if (!allPowerNets.find((p) => p.name === cp.name)) {
						allPowerNets.push(cp);
					}
				});

				// 搜索过滤
				let filteredPowerNets = allPowerNets;
				if (powerSearchText) {
					const searchLower = powerSearchText.toLowerCase();
					filteredPowerNets = allPowerNets.filter(
						(p) =>
							p.name.toLowerCase().includes(searchLower) ||
							p.voltage.toLowerCase().includes(searchLower) ||
							(p.powerName || '').toLowerCase().includes(searchLower),
					);
				}

				if (!filteredPowerNets || filteredPowerNets.length === 0) {
					container.innerHTML =
						'<div class="text-center text-muted py-2"><small>' +
						(powerSearchText ? '无匹配结果' : '暂无电源网络，点击 + 新建') +
						'</small></div>';
					return;
				}

				// 按名称排序
				const sortedPowerNets = [...filteredPowerNets].sort((a, b) => {
					const nameA = (a.powerName || a.name).toUpperCase();
					const nameB = (b.powerName || b.name).toUpperCase();
					return powerSortAscending ? nameA.localeCompare(nameB) : nameB.localeCompare(nameA);
				});

				container.innerHTML = sortedPowerNets
					.map((p) => {
						// 查找使用该电源的元件
						const poweredComps = allComponents.filter((comp) => comp.pins.some((pin) => pin.net === p.name));
						const compCount = poweredComps.length;
						const isCustom = customPowerNets.find((cp) => cp.name === p.name);

						return `
						<div class="power-item card mb-1" data-power-name="${p.name}" style="cursor:pointer;">
							<div class="card-body py-1 px-2">
								<div class="d-flex justify-content-between align-items-center">
									<span class="fw-bold text-danger">${p.powerName || p.name} @ ${p.voltage}</span>
									<div>
										${isCustom ? '<span class="badge bg-info me-1">自定义</span>' : ''}
										<span class="badge bg-secondary">${compCount} 元件</span>
									</div>
								</div>
								<small class="text-muted">${p.name}</small>
							</div>
						</div>
					`;
					})
					.join('');

				// 点击电源项显示详情
				container.querySelectorAll('.power-item').forEach((item) => {
					item.onclick = () => showPowerDetail(item.dataset.powerName);
				});
			}

			function showPowerDetail(powerName) {
				const power = powerNets.find((p) => p.name === powerName);
				if (!power) return;

				// 查找使用该电源的元件
				const poweredComps = allComponents.filter((comp) => comp.pins.some((pin) => pin.net === powerName));

				let bodyHtml = `
					<div class="mb-3">
						<h6 class="text-muted small">电源网络</h6>
						<div class="d-flex align-items-center">
							<span class="badge bg-danger me-2">${power.voltage}</span>
							<code>${power.name}</code>
						</div>
					</div>
					<div class="mb-3">
						<h6 class="text-muted small">供电元件 (${poweredComps.length})</h6>
						<div class="list-group">
				`;

				if (poweredComps.length === 0) {
					bodyHtml += '<div class="list-group-item small text-muted">无元件使用此电源</div>';
				} else {
					poweredComps.forEach((comp) => {
						const pageName = comp.schematicPageUuid ? pageNameMap[comp.schematicPageUuid] || '未知图页' : '';
						// 找出连接此电源的引脚
						const powerPins = comp.pins.filter((pin) => pin.net === powerName);
						const pinNames = powerPins.map((p) => p.name || p.number).join(', ');

						bodyHtml += `
							<div class="list-group-item small">
								<div class="d-flex justify-content-between">
									<span><strong>${comp.designator}</strong> <small class="text-muted">${comp.name}</small></span>
									${pageName ? `<small class="text-info">[${pageName}]</small>` : ''}
								</div>
								<small class="text-muted">引脚: ${pinNames}</small>
							</div>
						`;
					});
				}

				bodyHtml += '</div></div>';

				$('compModalTitle').innerHTML = `<span class="text-danger">${power.voltage}</span> 电源详情`;
				$('compModalBody').innerHTML = bodyHtml;
				compDetailModal.show();
			}

			function renderBuses() {
				// 过滤总线
				let filteredBuses = buses;
				if (busSearchText) {
					const searchLower = busSearchText.toLowerCase();
					filteredBuses = buses.filter((b) => {
						const cfg = BUS_CONFIGS.find((c) => c.presetName === b.type);
						const busName = `${cfg?.presetName || b.type}#${b.idx}`.toLowerCase();
						const nets = b.nets.join(' ').toLowerCase();
						const comps = (b.components || []).join(' ').toLowerCase();
						return busName.includes(searchLower) || nets.includes(searchLower) || comps.includes(searchLower);
					});
				}

				if (!filteredBuses.length) {
					busListContainer.innerHTML =
						'<div class="text-center text-muted py-2"><small>' + (busSearchText ? '无匹配结果' : '暂无总线') + '</small></div>';
					return;
				}
				busListContainer.innerHTML = filteredBuses
					.map((b) => {
						const cfg = BUS_CONFIGS.find((c) => c.presetName === b.type);
						const compCount = b.components?.length || 0;
						// 完善 3：无元件连接红色警告，只有一个元件黄色警告
						let borderStyle = '';
						let warningText = '';
						if (compCount === 0) {
							borderStyle = 'border: 2px solid #dc3545;';
							warningText = '<small class="text-danger mt-1 d-block">该总线无任何元件</small>';
						} else if (compCount === 1) {
							borderStyle = 'border: 2px solid #ffc107;';
							warningText = '<small class="text-warning mt-1 d-block">该总线仅一个元件</small>';
						}
						return `
						<div class="bus-item card mb-2" data-bus-key="${b.type}_${b.idx}" style="cursor:pointer;${borderStyle}">
							<div class="card-body py-2 px-2">
								<div class="d-flex justify-content-between align-items-center">
									<span class="fw-bold" style="color:${cfg?.color}">${cfg?.presetName || b.type}#${b.idx}</span>
									<span class="badge bg-secondary">${b.nets.length} 网络${compCount ? ` · ${compCount} 元件` : ''}</span>
								</div>
								<div class="mt-1">
									${b.nets.map((n) => `<span class="badge bg-light text-dark border me-1 small">${n}</span>`).join('')}
								</div>
								${compCount > 1 ? `<small class="text-success mt-1 d-block">${b.components.join(', ')}</small>` : warningText}
							</div>
						</div>
					`;
					})
					.join('');

				busListContainer.querySelectorAll('.bus-item').forEach((item) => {
					item.onclick = () => showBusDetail(item.dataset.busKey);
				});
			}

			function renderComponents() {
				// 过滤元件
				let filteredComps = allComponents;
				if (compSearchText) {
					const searchLower = compSearchText.toLowerCase();
					filteredComps = allComponents.filter((comp) => {
						const designator = comp.designator.toLowerCase();
						const name = (comp.name || '').toLowerCase();
						const buses = (comp.connectedBuses || [])
							.map((b) => {
								const cfg = BUS_CONFIGS.find((c) => c.presetName === b.type);
								return `${cfg?.presetName || b.type}#${b.idx}`;
							})
							.join(' ')
							.toLowerCase();
						return designator.includes(searchLower) || name.includes(searchLower) || buses.includes(searchLower);
					});
				}

				if (!filteredComps.length) {
					compListContainer.innerHTML =
						'<div class="text-center text-muted py-2"><small>' +
						(compSearchText ? '无匹配结果' : '暂无元件（引脚数≥4）') +
						'</small></div>';
					return;
				}

				// 按总线数量排序（支持升序/降序）
				filteredComps.sort((a, b) => {
					const busCountA = a.connectedBuses?.length || 0;
					const busCountB = b.connectedBuses?.length || 0;
					return compSortDescending ? busCountB - busCountA : busCountA - busCountB;
				});

				compListContainer.innerHTML = filteredComps
					.map((comp) => {
						// 计算连接的总线
						const connectedBuses = [];
						const busMap = new Map();
						const busSignalsMap = new Map(); // 记录每个总线使用的信号

						comp.pins.forEach((pin) => {
							if (pin.net) {
								const parsed = parseNetName(pin.net);
								if (parsed) {
									const key = `${parsed.type}_${parsed.idx}`;
									if (!busMap.has(key)) {
										busMap.set(key, { type: parsed.type, idx: parsed.idx });
										busSignalsMap.set(key, new Set());
									}
									busSignalsMap.get(key).add(parsed.signal);
								}
							}
						});

						busMap.forEach((bus) => {
							bus.usedSignals = Array.from(busSignalsMap.get(`${bus.type}_${bus.idx}`) || []);
							connectedBuses.push(bus);
						});
						comp.connectedBuses = connectedBuses;

						// 计算连接的电源
						const connectedPowers = [];
						comp.pins.forEach((pin) => {
							if (pin.net) {
								const powerParsed = parsePowerNetName(pin.net);
								if (powerParsed && !connectedPowers.find((p) => p.name === powerParsed.name)) {
									connectedPowers.push({
										...powerParsed,
										pinName: pin.name || pin.number,
									});
								}
							}
						});

						// 获取图页名称
						const pageName = comp.schematicPageUuid ? pageNameMap[comp.schematicPageUuid] || '未知图页' : '';

						return `
						<div class="comp-item card mb-2" data-designator="${comp.designator}" style="cursor:pointer;">
							<div class="card-body py-2 px-2">
								<div class="d-flex justify-content-between align-items-center">
									<div>
										<small class="text-muted">${comp.name}</small>
										<small class="fw-bold ms-1">${comp.designator}</small>
										${pageName ? `<small class="text-info ms-1">[${pageName}]</small>` : ''}
									</div>
									<div>
										${connectedPowers.length > 0 ? `<span class="badge bg-danger me-1">${connectedPowers.length} 电源</span>` : ''}
										<span class="badge bg-primary">${connectedBuses.length} 总线</span>
									</div>
								</div>
								${
									connectedPowers.length > 0
										? `
									<div class="mt-1">
										${connectedPowers.map((p) => `<span class="badge bg-danger me-1" title="${p.name} (${p.pinName})">${p.voltage}</span>`).join('')}
									</div>
								`
										: `<small class="text-warning mt-1 d-block">该元件无供电</small>`
								}
								${
									connectedBuses.length > 0
										? `
									<div class="mt-1">
										${connectedBuses
											.map((bus) => {
												const cfg = BUS_CONFIGS.find((c) => c.presetName === bus.type);
												const allSignals = cfg?.signals || [];
												const usedSignals = bus.usedSignals || [];
												const missingSignals = allSignals.filter((s) => !usedSignals.includes(s));
												const busLabel = `${cfg?.name || bus.type}#${bus.idx}`;

												// 如果有缺失信号，显示更明确的提示
												if (missingSignals.length > 0) {
													if (missingSignals.length > allSignals.length / 2) {
														// 缺的多：显示"总线名仅XX"
														return `<span class="badge bg-warning text-dark me-1" title="${busLabel} 缺失: ${missingSignals.join(', ')}">${busLabel}仅${usedSignals.join('+')}</span>`;
													} else {
														// 缺的少：显示"总线名无XXX"
														return `<span class="badge bg-secondary me-1" title="${busLabel} 未连接">${busLabel}无${missingSignals.join('/')}</span>`;
													}
												}

												// 完整连接，显示正常样式
												return `<span class="badge me-1" style="background:${cfg?.color || '#6c757d'}">${busLabel}</span>`;
											})
											.join('')}
									</div>
								`
										: ''
								}
							</div>
						</div>
					`;
					})
					.join('');

				compListContainer.querySelectorAll('.comp-item').forEach((item) => {
					item.onclick = () => showCompDetail(item.dataset.designator);
				});
			}

			function showBusDetail(busKey) {
				const [type, idx] = busKey.split('_');
				const currentIdx = parseInt(idx);
				const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
				const bus = buses.find((b) => b.type === type && b.idx === currentIdx);
				const comps = busComponents[busKey] || {};

				const sameTypeBuses = buses.filter((b) => b.type === type && b.idx !== currentIdx);
				const availableIndices = sameTypeBuses.map((b) => b.idx);

				$('modalTitle').innerHTML = `<span style="color:${cfg?.color}">${cfg?.name}#${currentIdx}</span> 详情`;

				let bodyHtml = `
					<div class="mb-3">
						<h6 class="text-muted small">网络标签</h6>
						<div>${bus?.nets.map((n) => `<span class="badge bg-primary me-1">${n}</span>`).join('') || '无'}</div>
					</div>
				`;

				if (Object.keys(comps).length) {
					bodyHtml += `<h6 class="text-muted small">连接的元件 (${Object.keys(comps).length})</h6>`;
					bodyHtml += '<div class="list-group">';

					for (const [designator, info] of Object.entries(comps)) {
						const compId = `comp_${designator.replace(/[^a-zA-Z0-9]/g, '_')}`;

						let channelBtnsHtml = '';
						if (availableIndices.length) {
							channelBtnsHtml = availableIndices
								.map(
									(i) =>
										`<button type="button" class="btn btn-outline-secondary btn-sm channel-btn" data-comp-id="${compId}" data-target-idx="${i}">${cfg?.name}#${i}</button>`,
								)
								.join('');
						} else {
							channelBtnsHtml = '<span class="text-muted small">无其他可用通道</span>';
						}

						bodyHtml += `
							<div class="list-group-item py-2" id="${compId}">
								<div class="d-flex justify-content-between align-items-center">
									<div>
										<small class="text-muted">${info.name}</small>
										<span class="fw-bold ms-2">${designator}</span>
									</div>
									<button type="button" class="btn btn-outline-primary btn-sm py-0 px-2 toggle-btn" data-comp-id="${compId}">
										调整通道
									</button>
								</div>
								<div class="mt-1">
									${info.pins
										.map(
											(p) => `
										<span class="badge bg-light text-dark border me-1 mb-1 small">
											${p.number ? `Pin${p.number}` : ''} ${p.name} → ${p.net}
										</span>
									`,
										)
										.join('')}
								</div>
								<div class="channel-selector mt-2" id="${compId}_selector" style="display:none;">
									<div class="alert alert-info py-1 px-2 small mb-1">
										选择目标通道（仅限 ${cfg?.name} 类型）:
									</div>
									<div class="d-flex flex-wrap gap-1 mb-2 channel-btns">
										${channelBtnsHtml}
										<button type="button" class="btn btn-outline-secondary btn-sm channel-btn" data-comp-id="${compId}" data-target-idx="new">新通道</button>
									</div>
									<div class="d-flex gap-1 align-items-center" id="${compId}_actions" style="display:none;">
										<input type="number" class="form-control form-control-sm" id="${compId}_newIdx" placeholder="新序号" min="1" max="99" style="width:100px;display:none;">
										<button type="button" class="btn btn-primary btn-sm apply-btn" data-bus-key="${busKey}" data-designator="${designator}" data-comp-id="${compId}" data-bus-type="${type}">
											立即更改
										</button>
										<button type="button" class="btn btn-secondary btn-sm cancel-btn" data-comp-id="${compId}">
											取消
										</button>
									</div>
								</div>
							</div>
						`;
					}
					bodyHtml += '</div>';
				} else {
					bodyHtml += `<div class="alert alert-warning py-2 small">暂无元件连接到此总线</div>`;
				}

				$('modalBody').innerHTML = bodyHtml;
				bindModalEvents(busKey, type, cfg);
				busDetailModal.show();
			}

			function bindModalEvents(busKey, busType, cfg) {
				document.querySelectorAll('.toggle-btn').forEach((btn) => {
					btn.addEventListener('click', function () {
						const compId = this.dataset.compId;
						const selector = document.getElementById(`${compId}_selector`);
						if (selector) {
							selector.style.display = selector.style.display === 'none' ? 'block' : 'none';
						}
					});
				});

				document.querySelectorAll('.channel-btn').forEach((btn) => {
					btn.addEventListener('click', function () {
						const compId = this.dataset.compId;
						const targetIdx = this.dataset.targetIdx;

						const newIdxInput = document.getElementById(`${compId}_newIdx`);
						const actionsDiv = document.getElementById(`${compId}_actions`);

						if (!newIdxInput || !actionsDiv) return;

						if (targetIdx === 'new') {
							newIdxInput.style.display = 'block';
							newIdxInput.value = '';
							newIdxInput.focus();
						} else {
							newIdxInput.style.display = 'none';
							newIdxInput.value = targetIdx;
						}
						actionsDiv.style.display = 'flex';
					});
				});

				document.querySelectorAll('.cancel-btn').forEach((btn) => {
					btn.addEventListener('click', function () {
						const compId = this.dataset.compId;
						const selector = document.getElementById(`${compId}_selector`);
						if (selector) selector.style.display = 'none';
					});
				});

				document.querySelectorAll('.apply-btn').forEach((btn) => {
					btn.addEventListener('click', async function () {
						const busKey = this.dataset.busKey;
						const designator = this.dataset.designator;
						const compId = this.dataset.compId;
						const busType = this.dataset.busType;

						const newIdxInput = document.getElementById(`${compId}_newIdx`);
						const newIdx = parseInt(newIdxInput.value);

						if (!newIdx || newIdx < 1) {
							showToast('请输入有效的序号', 'error');
							return;
						}

						const cfg = BUS_CONFIGS.find((c) => c.presetName === busType);
						const compInfo = busComponents[busKey]?.[designator];

						if (!compInfo) {
							showToast('找不到元件信息', 'error');
							return;
						}

						// 检测元件所在图页，必要时切换图页
						const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
						const compPageUuid = compInfo.schematicPageUuid;
						const compPageName = compPageUuid ? pageNameMap[compPageUuid] || '未知图页' : '未知图页';
						let needSwitchBack = false;

						addDebugLog(`元件 ${designator} 所在图页: ${compPageName} (${compPageUuid || '无UUID'})`, 'info');
						addDebugLog(`当前活动图页: ${currentPage?.name || '未知'} (${currentPage?.uuid || '无UUID'})`, 'info');

						if (compPageUuid && compPageUuid !== currentPage?.uuid) {
							// 元件在其他图页，需要先切换
							addDebugLog(`需要切换图页: ${currentPage?.name} → ${compPageName}`, 'warning');
							showToast(`正在切换到元件所在图页...`, 'info');
							try {
								await edaApi.dmt_EditorControl.openDocument(compPageUuid);
								await new Promise((r) => setTimeout(r, 200)); // 等待图页切换完成
								needSwitchBack = true;
								addDebugLog(`已切换到图页: ${compPageName}`, 'success');
							} catch (e) {
								addDebugLog(`切换图页失败: ${e.message || e}`, 'error');
								showToast(`切换图页失败: ${e.message || e}`, 'error');
								return;
							}
						} else {
							addDebugLog(`元件在当前图页，无需切换`, 'info');
						}

						showToast(`正在更改 ${designator} 到 ${cfg.name}#${newIdx}...`, 'info');

						let successCount = 0;

						for (const pin of compInfo.pins) {
							const parsed = parseNetName(pin.net);
							if (!parsed) continue;

							const newNetName = generateBusNetName(busType, newIdx, parsed.signal);

							try {
								if (pin.wirePrimitiveId && pin.wireLine) {
									console.log(`处理: ${pin.net} -> ${newNetName}`);
									await edaApi.sch_PrimitiveWire.delete(pin.wirePrimitiveId);
									const newWire = await edaApi.sch_PrimitiveWire.create(pin.wireLine, newNetName);
									if (newWire) successCount++;
								}
							} catch (e) {
								console.error(`修改失败: ${pin.net}`, e);
							}
						}

						if (successCount > 0) {
							showToast(`成功更改 ${successCount} 个网络标签`, 'success');
							setTimeout(async () => {
								try {
									busDetailModal.hide();
								} catch (e) {}
								await new Promise((r) => setTimeout(r, 100));

								// 跨图页操作后需要完整刷新，保留所有图页数据
								if (needSwitchBack) {
									await loadAllSchematicPages('调整通道（跨图页）');
								} else {
									await loadCurrentSchematicPage('调整通道');
								}
							}, 200);
						} else {
							showToast('更改失败', 'error');
							// 切换回原图页
							if (needSwitchBack && currentPage?.uuid) {
								try {
									await edaApi.dmt_EditorControl.openDocument(currentPage.uuid);
								} catch (e) {}
							}
						}
					});
				});
			}

			// 元件详情模态框
			function showCompDetail(designator) {
				const comp = allComponents.find((c) => c.designator === designator);
				if (!comp) return;

				$('compModalTitle').innerHTML = `<span class="text-primary">${comp.name}</span> <small class="text-muted">${designator}</small>`;

										<label class="form-check-label small ${p.net ? 'text-muted' : ''}" for="pin_${p.originalIndex}">
											<span class="fw-bold">${p.number || '?'}</span>
											<span class="text-muted">${p.name || '-'}</span>

										</label>
									</div>

							`,

						</div>
						<small class="text-muted">已连接的引脚显示在下方且不可选择</small>
					</div>

					<div class="alert alert-info py-2 px-2 small" id="selectedPinsInfo" style="display:none;">
						已选择 <span id="selectedCount">0</span> 个引脚
						<span id="pinWarning" class="text-warning ms-2"></span>
					</div>

					<div class="d-flex gap-2 mb-3" id="connectBusSection" style="display:none;">
						<button type="button" class="btn btn-primary btn-sm" id="connectBusBtn">接入总线</button>
						<button type="button" class="btn btn-danger btn-sm" id="connectPowerBtn">新增供电</button>
					</div>

					<div id="busSelectorSection" style="display:none;">
						<div class="row g-2 mb-2">
							<div class="col-6">
								<label class="form-label small mb-0">总线类型</label>
								<select class="form-select form-select-sm" id="connectBusType">
									<option value="">选择类型...</option>
								</select>
							</div>
							<div class="col-4">
								<label class="form-label small mb-0">序号</label>
								<input type="number" class="form-control form-control-sm" id="connectBusIdx" value="1" min="1" max="99">
							</div>
						</div>

						<div class="mb-2" id="connectSignalMapping">
							<label class="form-label small mb-1">信号映射</label>
							<div id="signalMappingList"></div>
						</div>

						<div class="d-flex gap-2">
							<button type="button" class="btn btn-success btn-sm" id="applyConnectBtn">立即接入</button>
							<button type="button" class="btn btn-secondary btn-sm" id="cancelConnectBtn">取消</button>
						</div>
					</div>

					<div id="powerSelectorSection" style="display:none;">
						<div class="mb-2">
							<label class="form-label small mb-0">选择电源</label>
							<select class="form-select form-select-sm" id="connectPowerSelect">
								<option value="">选择电源...</option>
							</select>
						</div>
						<div class="mb-2">
							<label class="form-label small mb-0">选择引脚</label>
							<select class="form-select form-select-sm" id="connectPowerPin">
								<option value="">选择引脚...</option>
							</select>
						</div>
						<div class="d-flex gap-2">
							<button type="button" class="btn btn-success btn-sm" id="applyPowerConnectBtn">立即接入</button>
							<button type="button" class="btn btn-secondary btn-sm" id="cancelPowerConnectBtn">取消</button>

				$('compModalBody').innerHTML = bodyHtml;
				bindCompModalEvents(comp);
				compDetailModal.show();
