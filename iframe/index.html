			function bindCompModalEvents(comp) {
				const selectedPins = new Set();
				const usedPins = new Set(); // 已绑定的引脚

				// 更新总线类型下拉列表，标注引脚数不足的类型
				function updateBusTypeOptions() {
					const count = selectedPins.size;
					let optionsHtml = '<option value="">选择类型...</option>';
					BUS_CONFIGS.forEach((c) => {
						const signalCount = c.signals.length;
						const insufficient = count < signalCount;
						const label = insufficient ? `${c.name} (需${signalCount}引脚，已选${count})` : c.name;
						optionsHtml += `<option value="${c.name}" ${insufficient ? 'class="text-warning"' : ''}>${label}</option>`;
					});
					$('connectBusType').innerHTML = optionsHtml;
				}

				// 引脚选择
				document.querySelectorAll('.pin-checkbox').forEach((cb) => {
					cb.addEventListener('change', function () {
						const idx = parseInt(this.dataset.pinIndex);
						if (this.checked) {
							selectedPins.add(idx);
						} else {
							selectedPins.delete(idx);
						}
						updateSelectedInfo(selectedPins.size);
						updateBusTypeOptions();
					});
				});

				// 点击引脚条目即可选中（仅未连接的引脚）
				document.querySelectorAll('.pin-item:not(.connected)').forEach((item) => {
					item.style.cursor = 'pointer';
					item.addEventListener('click', function (e) {
						// 如果点击的是复选框本身，不处理
						if (e.target.type === 'checkbox') return;
						const checkbox = this.querySelector('.pin-checkbox');
						if (checkbox && !checkbox.disabled) {
							checkbox.checked = !checkbox.checked;
							checkbox.dispatchEvent(new Event('change'));
						}
					});
				});

				// 全选（只选择未禁用的引脚）
				$('selectAllPinsBtn').addEventListener('click', function () {
					const enabledCheckboxes = document.querySelectorAll('.pin-checkbox:not(:disabled)');
					const allChecked = enabledCheckboxes.length > 0 && Array.from(enabledCheckboxes).every((cb) => cb.checked);
					enabledCheckboxes.forEach((cb) => {
						cb.checked = !allChecked;
						const idx = parseInt(cb.dataset.pinIndex);
						if (!allChecked) {
							selectedPins.add(idx);
						} else {
							selectedPins.delete(idx);
						}
					});
					updateSelectedInfo(!allChecked ? enabledCheckboxes.length : 0);
					updateBusTypeOptions();
				});

				function updateSelectedInfo(count) {
					const info = $('selectedPinsInfo');
					const section = $('connectBusSection');
					const warning = $('pinWarning');
					if (count > 0) {
						info.style.display = 'block';
						$('selectedCount').textContent = count;
						section.style.display = 'flex';
						// 检查是否有总线类型需要更多引脚
						const maxNeeded = Math.max(...BUS_CONFIGS.map((c) => c.signals.length));
						if (count < maxNeeded) {
							warning.textContent = `(部分总线需要更多引脚)`;
						} else {
							warning.textContent = '';
						}
					} else {
						info.style.display = 'none';
						section.style.display = 'none';
					}
				}

				// 接入总线按钮
				$('connectBusBtn').addEventListener('click', function () {
					$('busSelectorSection').style.display = 'block';
					this.style.display = 'none';
					updateBusTypeOptions();
				});

				// 取消按钮
				$('cancelConnectBtn').addEventListener('click', function () {
					$('busSelectorSection').style.display = 'none';
					$('connectBusBtn').style.display = 'block';
				});

				// 总线类型选择
				$('connectBusType').addEventListener('change', function () {
					const type = this.value;
					if (!type) return;

					const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
					const selectedPinIndices = Array.from(selectedPins);
					const selectedPinList = selectedPinIndices.map((i) => comp.pins[i]);

					// 按引脚名称排序，方便选择
					const availablePins = selectedPinIndices.map((idx, i) => ({
						index: idx,
						pin: selectedPinList[i],
					}));

					let mappingHtml =
						'<div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>信号</th><th>引脚</th><th></th></tr></thead><tbody>';
					cfg.signals.forEach((sig, i) => {
						mappingHtml += `
							<tr>
								<td><span class="badge bg-primary">${sig}</span></td>
								<td>
									<select class="form-select form-select-sm signal-pin-select" data-signal="${sig}">
										<option value="">选择引脚...</option>
										${availablePins.map((p) => `<option value="${p.index}" ${usedPins.has(p.index) ? 'disabled' : ''}>${p.pin.number || '?'} ${p.pin.name || '-'}${usedPins.has(p.index) ? ' (已用)' : ''}</option>`).join('')}
									</select>
								</td>
								<td><button type="button" class="btn btn-outline-danger btn-sm py-0 px-1 remove-signal-btn" data-signal="${sig}">✕</button></td>
							</tr>
						`;
					});
					mappingHtml += '</tbody></table></div>';

					$('signalMappingList').innerHTML = mappingHtml;

					// 引脚选择变化时更新其他下拉框
					document.querySelectorAll('.signal-pin-select').forEach((sel) => {
						sel.addEventListener('change', function () {
							const currentSignal = this.dataset.signal;
							const currentValue = this.value;

							// 更新已使用引脚集合
							usedPins.clear();
							document.querySelectorAll('.signal-pin-select').forEach((s) => {
								if (s.value) {
									usedPins.add(parseInt(s.value));
								}
							});

							// 更新所有下拉框的禁用状态
							document.querySelectorAll('.signal-pin-select').forEach((s) => {
								const signal = s.dataset.signal;
								const savedValue = s.value;
								Array.from(s.options).forEach((opt) => {
									if (opt.value && opt.value !== savedValue) {
										opt.disabled = usedPins.has(parseInt(opt.value));
										opt.textContent =
											opt.textContent.replace(' (已用)', '') + (usedPins.has(parseInt(opt.value)) ? ' (已用)' : '');
									}
								});
							});
						});
					});

					// 移除信号按钮
					document.querySelectorAll('.remove-signal-btn').forEach((btn) => {
						btn.addEventListener('click', function () {
							this.closest('tr').remove();
						});
					});
				});

				// 立即接入
				$('applyConnectBtn').addEventListener('click', async function () {
					const type = $('connectBusType').value;
					const idx = parseInt($('connectBusIdx').value);

					if (!type || !idx) {
						showToast('请选择总线类型和序号', 'error');
						return;
					}

					const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
					const mappings = [];

					document.querySelectorAll('.signal-pin-select').forEach((sel) => {
						if (sel.value) {
							mappings.push({
								signal: sel.dataset.signal,
								pinIndex: parseInt(sel.value),
							});
						}
					});

					if (mappings.length === 0) {
						showToast('请至少选择一个引脚映射', 'error');
						return;
					}

					// 检测元件所在图页，必要时切换图页
					const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
					const compPageUuid = comp.schematicPageUuid;
					const compPageName = compPageUuid ? pageNameMap[compPageUuid] || '未知图页' : '未知图页';
					let needSwitchBack = false;

					addDebugLog(`元件 ${comp.designator} 所在图页: ${compPageName} (${compPageUuid || '无UUID'})`, 'info');
					addDebugLog(`当前活动图页: ${currentPage?.name || '未知'} (${currentPage?.uuid || '无UUID'})`, 'info');

					if (compPageUuid && compPageUuid !== currentPage?.uuid) {
						// 元件在其他图页，需要先切换
						addDebugLog(`需要切换图页: ${currentPage?.name} → ${compPageName}`, 'warning');
						showToast(`正在切换到元件所在图页...`, 'info');
						try {
							await edaApi.dmt_EditorControl.openDocument(compPageUuid);
							await new Promise((r) => setTimeout(r, 200)); // 等待图页切换完成
							needSwitchBack = true;
							addDebugLog(`已切换到图页: ${compPageName}`, 'success');
						} catch (e) {
							addDebugLog(`切换图页失败: ${e.message || e}`, 'error');
							showToast(`切换图页失败: ${e.message || e}`, 'error');
							return;
						}
					} else {
						addDebugLog(`元件在当前图页，无需切换`, 'info');
					}

					showToast(`正在接入 ${cfg.name}#${idx}...`, 'info');

					let successCount = 0;

					for (const map of mappings) {
						const pin = comp.pins[map.pinIndex];
						if (!pin) continue;

						const newNetName = generateBusNetName(type, idx, map.signal);

						try {
							// 如果已有连接，先删除
							if (pin.wirePrimitiveId) {
								await edaApi.sch_PrimitiveWire.delete(pin.wirePrimitiveId);
							}

							// 根据引脚朝向确定导线方向
							// rotation: 0=右, 90=下, 180=左, 270=上
							const rotation = pin.rotation || 0;
							const settings = loadSettings();
							const wireLength = settings.wireLength || 50; // 使用用户设置的导线长度
							let line;

							if (rotation >= 315 || rotation < 45) {
								// 向右 (0°)
								line = [pin.x, pin.y, pin.x + wireLength, pin.y];
							} else if (rotation >= 45 && rotation < 135) {
								// 向下 (90°)
								line = [pin.x, pin.y, pin.x, pin.y + wireLength];
							} else if (rotation >= 135 && rotation < 225) {
								// 向左 (180°)
								line = [pin.x, pin.y, pin.x - wireLength, pin.y];
							} else {
								// 向上 (270°)
								line = [pin.x, pin.y, pin.x, pin.y - wireLength];
							}

							const newWire = await edaApi.sch_PrimitiveWire.create(line, newNetName);

							if (newWire) {
								successCount++;
								console.log(`已连接: Pin${pin.number} -> ${newNetName}`);
							}
						} catch (e) {
							console.error(`连接失败: Pin${pin.number}`, e);
						}
					}

					if (successCount > 0) {
						showToast(`成功接入 ${successCount} 个引脚`, 'success');
						setTimeout(async () => {
							try {
								compDetailModal.hide();
							} catch (e) {}
							await new Promise((r) => setTimeout(r, 100));

							// 跨图页操作后需要完整刷新，保留所有图页数据
							if (needSwitchBack) {
								await loadAllSchematicPages('引脚接入总线（跨图页）');
							} else {
								await loadCurrentSchematicPage('引脚接入总线');
							}
						}, 200);
					} else {
						showToast('接入失败', 'error');
						// 切换回原图页
						if (needSwitchBack && currentPage?.uuid) {
							try {
								await edaApi.dmt_EditorControl.openDocument(currentPage.uuid);
							} catch (e) {}
						}
					}
				});

				// 新增供电按钮
				$('connectPowerBtn').addEventListener('click', function () {
					$('busSelectorSection').style.display = 'none';
					$('powerSelectorSection').style.display = 'block';

					// 填充电源列表
					const allPowerNets = [...powerNets];
					customPowerNets.forEach((cp) => {
						if (!allPowerNets.find((p) => p.name === cp.name)) {
							allPowerNets.push(cp);
						}
					});

					let powerOptions = '<option value="">选择电源...</option>';
					allPowerNets.forEach((p) => {
						powerOptions += `<option value="${p.name}">${p.powerName || p.name} (${p.voltage})</option>`;
					});
					$('connectPowerSelect').innerHTML = powerOptions;

					// 填充引脚列表（未连接的引脚）
					let pinOptions = '<option value="">选择引脚...</option>';
					comp.pins.forEach((pin, idx) => {
						if (!pin.net) {
							pinOptions += `<option value="${idx}">${pin.number || '?'} ${pin.name || '-'}</option>`;
						}
					});
					$('connectPowerPin').innerHTML = pinOptions;
				});

				// 取消电源接入
				$('cancelPowerConnectBtn').addEventListener('click', function () {
					$('powerSelectorSection').style.display = 'none';
				});

				// 立即接入电源
				$('applyPowerConnectBtn').addEventListener('click', async function () {
					const powerName = $('connectPowerSelect').value;
					const pinIndex = $('connectPowerPin').value;

					if (!powerName || pinIndex === '') {
						showToast('请选择电源和引脚', 'error');
						return;
					}

					const pin = comp.pins[parseInt(pinIndex)];
					if (!pin) {
						showToast('引脚不存在', 'error');
						return;
					}

					// 检测元件所在图页，必要时切换图页
					const currentPage = await edaApi.dmt_Schematic.getCurrentSchematicPageInfo();
					const compPageUuid = comp.schematicPageUuid;
					let needSwitchBack = false;

					if (compPageUuid && compPageUuid !== currentPage?.uuid) {
						showToast(`正在切换到元件所在图页...`, 'info');
						try {
							await edaApi.dmt_EditorControl.openDocument(compPageUuid);
							await new Promise((r) => setTimeout(r, 200));
							needSwitchBack = true;
						} catch (e) {
							showToast(`切换图页失败: ${e.message || e}`, 'error');
							return;
						}
					}

					showToast(`正在接入电源 ${powerName}...`, 'info');

					try {
						// 如果已有连接，先删除
						if (pin.wirePrimitiveId) {
							await edaApi.sch_PrimitiveWire.delete(pin.wirePrimitiveId);
						}

						// 根据引脚朝向确定导线方向
						const rotation = pin.rotation || 0;
						const settings = loadSettings();
						const wireLength = settings.wireLength || 50;
						let line;

						if (rotation >= 315 || rotation < 45) {
							line = [pin.x, pin.y, pin.x + wireLength, pin.y];
						} else if (rotation >= 45 && rotation < 135) {
							line = [pin.x, pin.y, pin.x, pin.y + wireLength];
						} else if (rotation >= 135 && rotation < 225) {
							line = [pin.x, pin.y, pin.x - wireLength, pin.y];
						} else {
							line = [pin.x, pin.y, pin.x, pin.y - wireLength];
						}

						const newWire = await edaApi.sch_PrimitiveWire.create(line, powerName);

						if (newWire) {
							showToast(`成功接入电源 ${powerName}`, 'success');
							setTimeout(async () => {
								try {
									compDetailModal.hide();
								} catch (e) {}
								await new Promise((r) => setTimeout(r, 100));

								if (needSwitchBack) {
									await loadAllSchematicPages('电源接入（跨图页）');
								} else {
									await loadCurrentSchematicPage('电源接入');
								}
							}, 200);
						} else {
							showToast('接入失败', 'error');
							if (needSwitchBack && currentPage?.uuid) {
								try {
									await edaApi.dmt_EditorControl.openDocument(currentPage.uuid);
								} catch (e) {}
							}
						}
					} catch (e) {
						showToast(`接入失败: ${e.message || e}`, 'error');
						if (needSwitchBack && currentPage?.uuid) {
							try {
								await edaApi.dmt_EditorControl.openDocument(currentPage.uuid);
							} catch (e) {}
						}
					}
				});
			}

			function updatePreview() {
				const type = busTypeSelect.value;
				const idx = busIndexInput.value;
				const spacing = +spacingInput.value || 10;
				if (!type || !idx) {
					signalPreview.style.display = 'none';
					createBtn.disabled = true;
					createDelayBtn.disabled = true;
					return;
				}

				// 保存当前配置到 localStorage 和 EDA 存储
				try {
					const settings = loadSettings();
					settings.defaultBusType = type;
					settings.defaultBusIndex = +idx;
					settings.wireSpacing = spacing;
					saveSettings(settings);

					// 同时保存到 EDA 存储供快捷键使用
					edaApi.sys_Storage.setExtensionUserConfig('busConfig', { type, index: +idx, spacing });
				} catch (e) {
					console.error('保存配置失败:', e);
				}

				const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
				signalList.innerHTML = cfg.signals
					.map(
						(s) => `
					<div class="badge bg-light text-dark border d-block text-start mb-1">🏷 ${generateBusNetName(type, idx, s)}</div>
				`,
					)
					.join('');
				signalPreview.style.display = 'block';
				createBtn.disabled = false;
				createDelayBtn.disabled = false;
			}

			// 核心创建函数
			async function createWiresAtPosition(x, y) {
				const type = busTypeSelect.value;
				const idx = +busIndexInput.value;
				if (!type) return { ok: 0, total: 0, ids: [] };

				const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
				const settings = loadSettings();
				const spacing = +spacingInput.value || settings.wireSpacing || 10;
				const length = settings.wireLength || 50;
				const direction = settings.wireDirection || 'right';

				const ids = [];
				let ok = 0;

				for (let i = 0; i < cfg.signals.length; i++) {
					const name = generateBusNetName(type, idx, cfg.signals[i]);
					try {
						const coords = getWireCoords(x, y, i, spacing, length, direction);

						// 创建带网络标签的导线
						const w = await edaApi.sch_PrimitiveWire.create(coords, name);

						if (w) {
							ok++;
							const pid = w.primitiveId || w.getState_PrimitiveId?.();
							if (pid) ids.push(pid);
						}
					} catch (e) {
						console.error('创建导线失败:', e);
					}
					await new Promise((r) => setTimeout(r, 30));
				}

				return { ok, total: cfg.signals.length, ids };
			}

			// 固定位置创建
			async function createBusAtFixedPosition(e) {
				e.preventDefault();
				if (creating) return;

				creating = true;
				createBtn.disabled = true;
				progressAlert.style.display = 'block';
				progressText.textContent = '正在创建...';

				// 从配置读取固定位置
				const settings = loadSettings();
				const result = await createWiresAtPosition(settings.fixedX, settings.fixedY);

				if (result.ids.length) {
					try {
						await edaApi.sch_SelectControl.clearSelected();
						await edaApi.sch_SelectControl.doSelectPrimitives(result.ids);
					} catch (e) {}
				}

				creating = false;
				createBtn.disabled = false;
				progressAlert.style.display = 'none';

				const type = busTypeSelect.value;
				const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
				showToast(
					`创建 ${cfg.name}#${busIndexInput.value}，成功 ${result.ok}/${result.total} 个`,
					result.ok === result.total ? 'success' : 'warning',
				);

				// 固定位置只在当前图页创建，使用快速刷新
				await loadCurrentSchematicPage('固定位置创建');
			}

			// 延时放置
			async function createBusWithDelay() {
				if (creating) return;

				creating = true;
				createDelayBtn.disabled = true;
				delayInfo.style.display = 'block';

				// 从配置读取延时时长
				const settings = loadSettings();
				let countdown = settings.delaySeconds;
				delayCountdown.textContent = countdown;

				const countdownInterval = setInterval(() => {
					countdown--;
					delayCountdown.textContent = countdown;
					if (countdown <= 0) {
						clearInterval(countdownInterval);
					}
				}, 1000);

				// 延时
				await new Promise((r) => setTimeout(r, settings.delaySeconds * 1000));

				try {
					// 获取鼠标位置
					const pos = await edaApi.sch_SelectControl.getCurrentMousePosition();
					console.log('鼠标位置:', pos);

					if (!pos) {
						showToast('无法获取鼠标位置，请确保鼠标在画布上', 'error');
						creating = false;
						createDelayBtn.disabled = false;
						delayInfo.style.display = 'none';
						return;
					}

					progressAlert.style.display = 'block';
					progressText.textContent = '正在创建...';

					const result = await createWiresAtPosition(pos.x, pos.y);

					if (result.ids.length) {
						try {
							await edaApi.sch_SelectControl.clearSelected();
							await edaApi.sch_SelectControl.doSelectPrimitives(result.ids);
						} catch (e) {}
					}

					const type = busTypeSelect.value;
					const cfg = BUS_CONFIGS.find((c) => c.presetName === type);
					showToast(`在 (${pos.x}, ${pos.y}) 创建成功 ${result.ok}/${result.total} 个`, result.ok === result.total ? 'success' : 'warning');

					// 延时放置只在当前图页创建，使用快速刷新
					await loadCurrentSchematicPage('延时放置创建');
				} catch (e) {
					console.error('延时放置失败:', e);
					showToast(`放置失败: ${e.message || e}`, 'error');
				} finally {
					creating = false;
					createDelayBtn.disabled = false;
					delayInfo.style.display = 'none';
					progressAlert.style.display = 'none';
				}
			}

			// 监听 localStorage 变化（用于设置页面通知快捷键更改）
			window.addEventListener('storage', (e) => {
				if (e.key === 'mcu-bus-helper-shortcut-changed') {
					try {
						const data = JSON.parse(e.newValue);
						if (data && data.oldKey) {
							// 注销旧快捷键
							if (registeredShortcutKey === data.oldKey) {
								unregisterShortcutKey();
								addDebugLog(`快捷键 ${data.oldKey} 已注销，请重新激活 ${data.newKey}`, 'warning');
								showToast(`快捷键已更改，请重新激活`, 'warning');
							}
							// 清除标志
							localStorage.removeItem('mcu-bus-helper-shortcut-changed');
						}
					} catch (err) {
						console.error('[总线助手] 处理快捷键更改通知失败:', err);
					}
				}
			});

			// 快捷键按钮点击注册
			shortcutBtn.onclick = () => {
				initShortcutKey();
			};

			busTypeSelect.onchange = updatePreview;
			busIndexInput.oninput = updatePreview;
			$('createForm').onsubmit = createBusAtFixedPosition;
			createDelayBtn.onclick = createBusWithDelay;

			// 完善 6：快捷键按钮显示当前快捷键和注册状态
			function updateShortcutButtonHint() {
				const settings = loadSettings();
				const key = settings.shortcutKey || '1';
				if (shortcutKeyRegistered) {
					shortcutBtn.innerHTML = `⌨ ${key} ✓`;
					shortcutBtn.classList.remove('btn-outline-info');
					shortcutBtn.classList.add('btn-info');
				} else {
					shortcutBtn.innerHTML = `⌨ ${key} (点击激活)`;
					shortcutBtn.classList.remove('btn-info');
					shortcutBtn.classList.add('btn-outline-info');
				}
			}

			// 完善 7：刷新按钮显示快捷键提示
			function updateRefreshShortcutHint() {
				const settings = loadSettings();
				const key = settings.refreshShortcutKey || 'R';
				$('refreshShortcutHint').textContent = ` (${key})`;
			}
			refreshBtn.onclick = async () => {
				refreshBtn.disabled = true;
				// 展开调试日志卡片
				const debugCollapse = $('debugLogCollapse');
				if (debugCollapse && !debugCollapse.classList.contains('show')) {
					debugCollapse.classList.add('show');
				}
				await loadAllSchematicPages('手动刷新');
				refreshBtn.disabled = false;
			};
			sortBtn.onclick = async () => {
				sortDescending = !sortDescending;
				sortBuses();
				renderBuses();
				showToast(`已按元件数${sortDescending ? '降序' : '升序'}排列`, 'success');
			};

			// 搜索框事件
			$('busSearchInput').oninput = function () {
				busSearchText = this.value.trim();
				renderBuses();
			};

			$('compSearchInput').oninput = function () {
				compSearchText = this.value.trim();
				renderComponents();
			};

			// 元件排序按钮
			$('compSortBtn').onclick = function () {
				compSortDescending = !compSortDescending;
				renderComponents();
				showToast(`元件已按总线数${compSortDescending ? '降序' : '升序'}排列`, 'success');
			};

			// 电源搜索框
			$('powerSearchInput').oninput = function () {
				powerSearchText = this.value.trim();
				renderPowerNets();
			};

			// 电源排序按钮
			$('powerSortBtn').onclick = function () {
				powerSortAscending = !powerSortAscending;
				renderPowerNets();
				showToast(`电源已按名称${powerSortAscending ? '升序' : '降序'}排列`, 'success');
			};

			// 新建电源轨道按钮
			$('powerCreateBtn').onclick = function () {
				$('powerNameInput').value = '';
				$('powerVoltageInput').value = '';
				$('powerPreview').innerHTML = '<code class="text-muted">PW_名称_电压</code>';
				powerCreateModal.show();
			};

			// 电源名称输入实时预览
			$('powerNameInput').oninput = updatePowerPreview;
			$('powerVoltageInput').oninput = updatePowerPreview;

			function updatePowerPreview() {
				const name = $('powerNameInput')
					.value.toUpperCase()
					.replace(/[^A-Z0-9]/g, '');
				const voltage = $('powerVoltageInput')
					.value.toUpperCase()
					.replace(/[^0-9V]/g, '');
				if (name && voltage) {
					$('powerPreview').innerHTML = `<code class="text-danger">PW_${name}_${voltage}</code>`;
				} else {
					$('powerPreview').innerHTML = '<code class="text-muted">PW_名称_电压</code>';
				}
			}

			// 保存电源轨道
			$('powerSaveBtn').onclick = function () {
				const name = $('powerNameInput')
					.value.toUpperCase()
					.replace(/[^A-Z0-9]/g, '');
				const voltage = $('powerVoltageInput')
					.value.toUpperCase()
					.replace(/[^0-9V]/g, '');

				if (!name) {
					showToast('请输入电源名称', 'warning');
					return;
				}
				if (!voltage || !voltage.match(/^\d+V\d*$/)) {
					showToast('请输入有效的电压值（如 3V3、5V）', 'warning');
					return;
				}

				// 生成网络标签名称
				const netName = `PW_${name}_${voltage}`;

				// 检查是否已存在
				if (customPowerNets.find((p) => p.name === netName)) {
					showToast('该电源轨道已存在', 'warning');
					return;
				}

				// 解析电压显示值
				let voltageDisplay = voltage;
				const voltageMatch = voltage.match(/^(\d+)V(\d*)$/);
				if (voltageMatch && voltageMatch[2]) {
					voltageDisplay = `${voltageMatch[1]}.${voltageMatch[2]}V`;
				} else if (voltageMatch) {
					voltageDisplay = `${voltageMatch[1]}V`;
				}

				// 添加到自定义电源列表
				const newPowerNet = {
					name: netName,
					powerName: name,
					voltage: voltageDisplay,
					voltageStr: voltage,
				};
				customPowerNets.push(newPowerNet);

				// 询问用户是否保存到配置文件
				const saveToConfig = confirm(`电源轨道 ${netName} 已创建。\n\n是否保存到配置文件？\n\n保存后可在"助手设置"中管理。`);

				if (saveToConfig) {
					// 保存到配置
					const settings = loadSettings();
					settings.customPowerNets = customPowerNets;
					saveSettings(settings);
					showToast(`电源轨道 ${netName} 已保存到配置`, 'success');
				} else {
					showToast(`电源轨道 ${netName} 已创建（仅当前会话有效）`, 'info');
				}

				powerCreateModal.hide();
				renderPowerNets();
			};

			// 折叠图标状态更新
			document.querySelectorAll('.collapse').forEach((collapse) => {
				collapse.addEventListener('show.bs.collapse', function () {
					const icon = this.previousElementSibling?.querySelector('.collapse-icon');
					if (icon) icon.style.transform = 'rotate(0deg)';
				});
				collapse.addEventListener('hide.bs.collapse', function () {
					const icon = this.previousElementSibling?.querySelector('.collapse-icon');
					if (icon) icon.style.transform = 'rotate(-90deg)';
				});
			});

			initMainPanel();
		</script>
	</body>
</html>
