<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Li元素计数器 - 配置</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 标题区域 -->
    <header class="header">
      <h1 class="title">
        <span class="icon">📊</span>
        Li元素计数器
      </h1>
      <p class="subtitle">配置要监控的URL</p>
    </header>

    <!-- URL输入区域 -->
    <section class="add-url-section">
      <div class="input-group">
        <input 
          type="text" 
          id="url-input" 
          class="url-input" 
          placeholder="输入URL (支持通配符 *，如 https://example.com/*)"
          aria-label="URL输入"
        >
        <button type="button" id="add-btn" class="btn btn-primary" title="添加URL">
          添加
        </button>
      </div>
      <p class="input-hint">使用 * 作为通配符匹配任意路径</p>
    </section>

    <!-- URL列表区域 -->
    <section class="url-list-section">
      <div class="section-header">
        <h2 class="section-title">已配置的URL</h2>
        <span id="url-count" class="url-count">0 个</span>
      </div>
      
      <!-- 空状态提示 -->
      <div id="empty-state" class="empty-state">
        <p class="empty-text">暂无配置的URL</p>
        <p class="empty-hint">添加URL后，访问该页面时会显示Li计数器</p>
      </div>

      <!-- URL列表 -->
      <ul id="url-list" class="url-list" aria-label="URL列表">
        <!-- 动态生成 -->
      </ul>
    </section>

    <!-- 操作区域 -->
    <footer class="footer">
      <button type="button" id="clear-all-btn" class="btn btn-danger btn-sm" title="清空所有URL">
        清空全部
      </button>
      <button type="button" id="save-btn" class="btn btn-success btn-sm" title="保存配置">
        保存配置
      </button>
    </footer>

    <!-- 状态提示 -->
    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
