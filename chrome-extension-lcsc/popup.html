<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antifragile-扩展设置</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/bootstrap-icons.min.css" rel="stylesheet">
  <script src="js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      width: 800px;
      min-height: 800px;
      max-height: 1000px;
      overflow-y: auto;
    }
    .config-list {
      max-height: 320px;
      overflow-y: auto;
    }
    .accordion-button {
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
    }
    .accordion-button:not(.collapsed) {
      background-color: #e7f1ff;
      color: #0d6efd;
    }
    .accordion-button::after {
      width: 0.75rem;
      height: 0.75rem;
      background-size: 0.75rem;
    }
    .accordion-body {
      padding: 0.75rem;
    }
    .field-config {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 0.25rem;
      padding: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .field-config:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-2">
    <h6 class="mb-2">
      <i class="bi bi-gear"></i> Antifragile-悬浮工具栏设置
    </h6>
    
    <!-- 当前页面URL -->
    <div class="mb-2">
      <label class="form-label small fw-bold">当前页面URL</label>
      <div class="input-group input-group-sm">
        <input type="text" id="currentUrl" class="form-control" readonly>
        <button class="btn btn-outline-secondary" type="button" id="copyUrl" title="复制">
          <i class="bi bi-clipboard"></i>
        </button>
      </div>
    </div>

    <hr class="my-2">
    
    <!-- 扩展状态栏 -->
  <div class="mb-2 p-2 bg-white rounded border">
  <div class="row text-center">
        <div class="col-3">
          <div class="small text-muted">已保存配置</div>
          <div class="fw-bold" id="configCount">0</div>
        </div>
        <div class="col-3">
          <div class="small text-muted">当前页面</div>
          <div class="fw-bold" id="matchedConfig">未匹配</div>
        </div>
        <div class="col-3">
          <div class="small text-muted">扩展状态</div>
          <div class="fw-bold" id="extensionStatus">未检测</div>
        </div>
        <div class="col-3 d-flex align-items-center justify-content-center">
          <button class="btn btn-outline-primary btn-sm" id="testContentScript" title="测试当前页面的内容脚本是否在运行">
            <i class="bi bi-search"></i> 检测页面扩展
          </button>
        </div>
      </div>
    </div>
    
    <!-- URL配置列表 -->
    <div class="mb-2">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <label class="form-label small fw-bold mb-0">URL配置列表</label>
        <button class="btn btn-success btn-sm" id="addUrlConfig">
          <i class="bi bi-plus-lg"></i> 添加
        </button>
      </div>
      
      <div class="accordion" id="configAccordion">
        <!-- 动态生成的URL配置项 -->
      </div>
    </div>

    <!-- 状态提示 -->
    <div id="statusMessage" class="alert alert-success py-1 small d-none" role="alert">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
